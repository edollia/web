<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#fff7fb">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="apple-touch-icon" href="/favicon.png">
    <link rel="canonical" href="https://doll.gg/stream/">
    <title>Live</title>
    <link rel="stylesheet" href="../styles.css?v=9.7">
    <link rel="stylesheet" href="../stream.css?v=1.2">
</head>
<body class="stream-page">
    <script>
        (function() {
            try {
                if (sessionStorage.getItem('doll_stream_from_pull') === '1') {
                    sessionStorage.removeItem('doll_stream_from_pull');
                    document.body.classList.add('stream-arriving');
                    window.setTimeout(function() {
                        document.body.classList.remove('stream-arriving');
                    }, 640);
                }
            } catch (error) {
                // Normal entry still works without session storage.
            }
        }());
    </script>
    <a href="../index.html" class="stream-back-button" id="stream-back-button" aria-label="Back to main page">
        <span class="stream-back-icon" aria-hidden="true"></span>
    </a>
    <img src="../dropdown1.png" alt="" class="stream-page-drape" aria-hidden="true">
    <div class="stream-page-ornaments" aria-hidden="true">
        <span class="stream-bubble stream-bubble-one"></span>
        <span class="stream-bubble stream-bubble-two"></span>
        <span class="stream-bubble stream-bubble-three"></span>
        <span class="stream-bubble stream-bubble-four"></span>
        <span class="stream-bubble stream-bubble-five"></span>
        <span class="stream-bubble stream-bubble-six"></span>
        <span class="stream-bubble stream-bubble-seven"></span>
        <span class="stream-heart stream-heart-one"></span>
        <span class="stream-heart stream-heart-two"></span>
        <span class="stream-spark spark-one"></span>
        <span class="stream-spark spark-two"></span>
        <span class="stream-spark spark-three"></span>
    </div>
    <main class="stream-coming-soon" id="stream-coming-soon" aria-label="Live page">
        <div class="stream-title-wrap">
            <h1 id="stream-coming-title">Coming Soon</h1>
        </div>
    </main>
    <main class="stream-live-shell" id="stream-live-shell" data-stream-base="" data-video-src="" data-stream-name="Live" data-stream-enabled="false" data-chat-enabled="true" data-stream-provider="auto" data-stream-aspect="landscape" data-offline-message="stream is offline right now." hidden aria-label="Live page">
        <div class="stream-room-header">
            <div class="stream-room-id">
                <span class="stream-room-count"><strong id="stream-viewer-count">--</strong> watching</span>
                <span id="stream-updated-line" class="stream-room-updated">waiting</span>
                <span id="stream-server-line" class="stream-room-server"></span>
            </div>

            <div class="stream-room-actions">
                <div class="stream-live-status" id="stream-live-status">
                    <span aria-hidden="true"></span>
                    <strong id="stream-status-text">offline</strong>
                </div>
                <button type="button" id="stream-chat-overlay-button" aria-label="Toggle chat overlay">chat</button>
                <button type="button" id="stream-hide-preview" aria-label="Close">×</button>
            </div>
        </div>

        <section class="stream-stage" aria-label="Video player">
            <div class="stream-player-shell">
                <div class="stream-player-frame" id="stream-video-frame">
                    <div class="stream-setup-panel" id="stream-video-setup">
                        <span class="stream-setup-mark" aria-hidden="true"></span>
                        <h2>Loading...</h2>
                        <p>One sec.</p>
                    </div>
                </div>
                <div class="stream-video-hud" aria-hidden="true">
                    <span id="stream-hud-status">offline</span>
                    <span><strong id="stream-hud-viewer-count">--</strong> watching</span>
                </div>
                <div class="stream-player-controls" aria-label="Video controls">
                    <button type="button" id="stream-theater-button">Theater</button>
                    <button type="button" id="stream-fullscreen-button">Fullscreen</button>
                    <button type="button" id="stream-player-chat-button">Chat</button>
                    <button type="button" id="stream-pip-button">PiP</button>
                </div>
            </div>
        </section>

        <div class="stream-layout-resizer" id="stream-layout-resizer" role="separator" aria-label="Resize video and chat" aria-orientation="horizontal" tabindex="0"></div>

        <aside class="stream-chat-panel" aria-label="Chat">
            <div class="stream-chat-header">
                <strong>chat</strong>
                <span class="stream-chat-pill" id="stream-chat-state" hidden>offline</span>
            </div>

            <div class="stream-chat-frame" id="stream-chat-frame">
                <div class="stream-chat-feed" id="stream-chat-feed" role="log" aria-live="polite">
                    <div class="stream-chat-empty" id="stream-chat-empty">chat is waking up...</div>
                </div>
                <button type="button" class="stream-chat-paused" id="stream-chat-paused" hidden>chat paused</button>
                <form class="stream-chat-form" id="stream-chat-form" autocomplete="off">
                    <input type="text" id="stream-chat-name" name="nickname" maxlength="18" placeholder="pick a name">
                    <div class="stream-chat-send-row">
                        <input type="text" id="stream-chat-message" name="message" maxlength="100" placeholder="chat" aria-label="Chat message, 100 characters max">
                        <button type="submit" id="stream-chat-send" aria-label="Send message">♡</button>
                    </div>
                </form>
            </div>
        </aside>

        <div class="stream-toast" id="stream-toast" role="status" aria-live="polite"></div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        (function() {
            var backButton = document.getElementById('stream-back-button');
            var comingSoon = document.getElementById('stream-coming-soon');
            var comingTitle = document.getElementById('stream-coming-title');
            var liveShell = document.getElementById('stream-live-shell');
            var hidePreviewButton = document.getElementById('stream-hide-preview');
            var theaterButton = document.getElementById('stream-theater-button');
            var fullscreenButton = document.getElementById('stream-fullscreen-button');
            var pipButton = document.getElementById('stream-pip-button');
            var chatOverlayButton = document.getElementById('stream-chat-overlay-button');
            var playerChatButton = document.getElementById('stream-player-chat-button');
            var streamStatus = document.getElementById('stream-live-status');
            var streamStatusText = document.getElementById('stream-status-text');
            var viewerCount = document.getElementById('stream-viewer-count');
            var hudStatus = document.getElementById('stream-hud-status');
            var hudViewerCount = document.getElementById('stream-hud-viewer-count');
            var serverLine = document.getElementById('stream-server-line');
            var updatedLine = document.getElementById('stream-updated-line');
            var chatState = document.getElementById('stream-chat-state');
            var toast = document.getElementById('stream-toast');
            var chatFeed = document.getElementById('stream-chat-feed');
            var chatForm = document.getElementById('stream-chat-form');
            var chatNameInput = document.getElementById('stream-chat-name');
            var chatMessageInput = document.getElementById('stream-chat-message');
            var chatSendButton = document.getElementById('stream-chat-send');
            var chatEmpty = document.getElementById('stream-chat-empty');
            var chatPausedButton = document.getElementById('stream-chat-paused');
            var layoutResizer = document.getElementById('stream-layout-resizer');
            var SUPABASE_URL = 'https://zvqdodzkhmcptwkjlfeu.supabase.co';
            var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp2cWRvZHpraG1jcHR3a2psZmV1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDg3NjM1NjAsImV4cCI6MjA2NDMzOTU2MH0.i1xbRIhPHVkDIrnDlQFP0ebNklrx8WVQcQo8Iuo9zG8';
            var STREAM_CHAT_TABLE = 'stream_messages';
            var DEFAULT_STREAM_SETTINGS = {
                stream_enabled: false,
                stream_chat_enabled: true,
                stream_provider: 'auto',
                stream_aspect: 'landscape',
                stream_title: 'Live',
                stream_url: '',
                stream_video_url: '',
                stream_offline_message: 'stream is offline right now.'
            };
            var streamSettings = Object.assign({}, DEFAULT_STREAM_SETTINGS);
            var streamChatSettings = {
                chat_enabled: true,
                slow_mode_seconds: 5,
                blocked_words: []
            };
            var streamPreviewMode = new URLSearchParams(window.location.search).get('preview') === '1';
            var CHAT_COOLDOWN_MS = 5000;
            var CHAT_LIMIT = 20;
            var CHAT_MESSAGE_LIMIT = 100;
            var statusTimer = null;
            var toastTimer = null;
            var chatPollTimer = null;
            var chatCooldownTimer = null;
            var chatChannel = null;
            var presenceChannel = null;
            var streamClient = null;
            var clientIpPromise = null;
            var seenMessageIds = new Set();
            var localTestMessages = [];
            var unlockTaps = 0;
            var unlockResetTimer = null;
            var currentViewerCount = 1;
            if (!backButton) return;

            function getHomeUrl() {
                if (window.location.protocol === 'file:') {
                    return '../index.html';
                }

                var path = window.location.pathname;
                var homePath = path.replace(/\/stream\/?$/, '/');
                if (homePath === path) homePath = '/';
                return window.location.origin + homePath;
            }

            backButton.addEventListener('click', function(event) {
                event.preventDefault();
                window.location.href = getHomeUrl();
            });

            function normalizeStreamUrl(url) {
                return String(url || '').trim().replace(/\/+$/, '');
            }

            function getStreamUrl() {
                return normalizeStreamUrl(liveShell ? liveShell.dataset.streamBase : '');
            }

            function getVideoSourceUrl() {
                return normalizeStreamUrl(liveShell ? liveShell.dataset.videoSrc : '');
            }

            function normalizeOptionalUrl(value) {
                var cleanValue = normalizeStreamUrl(value);
                if (!cleanValue) return '';
                try {
                    return new URL(cleanValue).href.replace(/\/+$/, '');
                } catch (error) {
                    return '';
                }
            }

            function normalizeStreamSettings(value) {
                var settings = value && typeof value === 'object' ? value : {};
                return {
                    stream_enabled: settings.stream_enabled === true,
                    stream_chat_enabled: settings.stream_chat_enabled !== false,
                    stream_provider: ['auto', 'owncast', 'twitch', 'youtube', 'vimeo', 'direct'].includes(settings.stream_provider) ? settings.stream_provider : DEFAULT_STREAM_SETTINGS.stream_provider,
                    stream_aspect: ['landscape', 'portrait', 'square', 'auto'].includes(settings.stream_aspect) ? settings.stream_aspect : DEFAULT_STREAM_SETTINGS.stream_aspect,
                    stream_title: normalizeText(settings.stream_title || DEFAULT_STREAM_SETTINGS.stream_title, 60) || DEFAULT_STREAM_SETTINGS.stream_title,
                    stream_url: normalizeOptionalUrl(settings.stream_url),
                    stream_video_url: normalizeOptionalUrl(settings.stream_video_url),
                    stream_offline_message: normalizeText(settings.stream_offline_message || DEFAULT_STREAM_SETTINGS.stream_offline_message, 160) || DEFAULT_STREAM_SETTINGS.stream_offline_message
                };
            }

            function normalizeStreamChatSettings(value) {
                var settings = value && typeof value === 'object' ? value : {};
                var slowMode = Number(settings.slow_mode_seconds ?? 5);
                return {
                    chat_enabled: settings.chat_enabled !== false,
                    slow_mode_seconds: Number.isFinite(slowMode) ? Math.max(0, Math.min(120, slowMode)) : 5,
                    blocked_words: Array.isArray(settings.blocked_words)
                        ? settings.blocked_words.map(function(word) {
                            return normalizeText(word, 40).toLowerCase();
                        }).filter(Boolean)
                        : []
                };
            }

            function applyStreamSettings() {
                if (comingTitle) comingTitle.textContent = streamSettings.stream_enabled ? streamSettings.stream_title : 'Coming Soon';
                if (!liveShell) return;
                liveShell.dataset.streamEnabled = streamSettings.stream_enabled ? 'true' : 'false';
                liveShell.dataset.chatEnabled = streamSettings.stream_chat_enabled !== false ? 'true' : 'false';
                liveShell.dataset.streamProvider = streamSettings.stream_provider || DEFAULT_STREAM_SETTINGS.stream_provider;
                liveShell.dataset.streamAspect = streamSettings.stream_aspect || DEFAULT_STREAM_SETTINGS.stream_aspect;
                liveShell.dataset.streamBase = streamSettings.stream_url || '';
                liveShell.dataset.videoSrc = streamSettings.stream_video_url || '';
                liveShell.dataset.streamName = streamSettings.stream_title || DEFAULT_STREAM_SETTINGS.stream_title;
                liveShell.dataset.offlineMessage = streamSettings.stream_offline_message || DEFAULT_STREAM_SETTINGS.stream_offline_message;
                document.body.classList.toggle('stream-chat-hidden', streamSettings.stream_chat_enabled === false);
                document.body.classList.toggle('stream-aspect-landscape', streamSettings.stream_aspect === 'landscape');
                document.body.classList.toggle('stream-aspect-portrait', streamSettings.stream_aspect === 'portrait');
                document.body.classList.toggle('stream-aspect-square', streamSettings.stream_aspect === 'square');
                document.body.classList.toggle('stream-aspect-auto', streamSettings.stream_aspect === 'auto');
            }

            async function loadStreamSettings() {
                var client = getStreamClient();
                if (!client) {
                    applyStreamSettings();
                    return streamSettings;
                }

                try {
                    var result = await client
                        .from('site_settings')
                        .select('value')
                        .eq('id', 'links')
                        .maybeSingle();
                    if (!result.error && result.data) {
                        streamSettings = normalizeStreamSettings(result.data.value);
                    }
                } catch (error) {
                    streamSettings = Object.assign({}, DEFAULT_STREAM_SETTINGS);
                }
                applyStreamSettings();
                return streamSettings;
            }

            function isChatTestMode() {
                return liveShell?.dataset.chatMode === 'test';
            }

            function showToast(message) {
                if (!toast) return;
                toast.textContent = message;
                toast.classList.add('show');
                window.clearTimeout(toastTimer);
                toastTimer = window.setTimeout(function() {
                    toast.classList.remove('show');
                }, 2200);
            }

            function setConnectionState(state, text) {
                if (!streamStatus || !streamStatusText) return;
                streamStatus.dataset.state = state;
                streamStatusText.textContent = text;
                if (hudStatus) hudStatus.textContent = text;
            }

            function setUpdatedLine(message) {
                if (updatedLine) updatedLine.textContent = message;
            }

            function setViewerCount(count, keepAtLeastOne) {
                var parsed = Number(count);
                if (!Number.isFinite(parsed)) parsed = keepAtLeastOne ? 1 : 0;
                currentViewerCount = keepAtLeastOne ? Math.max(1, parsed) : Math.max(0, parsed);
                if (viewerCount) viewerCount.textContent = String(currentViewerCount);
                if (hudViewerCount) hudViewerCount.textContent = String(currentViewerCount);
            }

            function getStreamClient() {
                if (streamClient) return streamClient;
                if (!window.supabase || typeof window.supabase.createClient !== 'function') {
                    return null;
                }

                streamClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
                    db: { schema: 'public' },
                    auth: {
                        persistSession: false,
                        autoRefreshToken: false
                    }
                });
                return streamClient;
            }

            function normalizeText(value, maxLength) {
                return String(value || '').replace(/\s+/g, ' ').trim().slice(0, maxLength);
            }

            function getStoredNickname() {
                try {
                    return normalizeText(localStorage.getItem('doll_stream_chat_nickname') || '', 18);
                } catch (error) {
                    return '';
                }
            }

            function saveNickname(nickname) {
                try {
                    localStorage.setItem('doll_stream_chat_nickname', nickname);
                } catch (error) {
                    // Chat still works without local storage.
                }
            }

            function lockNickname(nickname) {
                var cleanName = normalizeText(nickname, 18);
                if (!cleanName) return;
                saveNickname(cleanName);
                if (chatNameInput) {
                    chatNameInput.value = cleanName;
                    chatNameInput.readOnly = true;
                    chatNameInput.tabIndex = -1;
                }
                if (chatForm) chatForm.classList.add('nickname-locked');
            }

            function unlockNicknameForChange() {
                try {
                    localStorage.removeItem('doll_stream_chat_nickname');
                } catch (error) {
                    // Input still unlocks even if storage is blocked.
                }
                if (chatNameInput) {
                    chatNameInput.readOnly = false;
                    chatNameInput.tabIndex = 0;
                    chatNameInput.value = '';
                    chatNameInput.focus();
                }
                if (chatForm) chatForm.classList.remove('nickname-locked');
            }

            function applyStoredNickname() {
                var storedName = getStoredNickname();
                if (!storedName) return;
                lockNickname(storedName);
            }

            function getLastChatSentAt() {
                try {
                    return Number(localStorage.getItem('doll_stream_chat_last_sent') || 0);
                } catch (error) {
                    return Number(window.dollStreamLastChatSentAt || 0);
                }
            }

            function setLastChatSentAt(value) {
                window.dollStreamLastChatSentAt = value;
                try {
                    localStorage.setItem('doll_stream_chat_last_sent', String(value));
                } catch (error) {
                    // The in-memory fallback above covers private/storage-blocked modes.
                }
            }

            function getChatCooldownRemaining() {
                return Math.max(0, CHAT_COOLDOWN_MS - (Date.now() - getLastChatSentAt()));
            }

            function refreshChatButtonState() {
                if (!chatSendButton) return;
                if (isChatTestMode()) {
                    chatSendButton.disabled = false;
                    chatSendButton.textContent = '♡';
                    return;
                }
                if (streamSettings.stream_chat_enabled === false || streamChatSettings.chat_enabled === false) {
                    chatSendButton.disabled = true;
                    chatSendButton.textContent = '♡';
                    if (chatState) chatState.textContent = streamSettings.stream_chat_enabled === false ? 'closed' : 'paused';
                    return;
                }

                var remaining = getChatCooldownRemaining();
                if (remaining > 0) {
                    chatSendButton.disabled = true;
                    chatSendButton.textContent = String(Math.ceil(remaining / 1000));
                    if (chatState) chatState.textContent = 'cooldown';
                    return;
                }

                chatSendButton.disabled = false;
                chatSendButton.textContent = '♡';
                if (chatState && chatState.textContent === 'cooldown') {
                    chatState.textContent = 'live';
                }
            }

            function startChatCooldownTicker() {
                window.clearInterval(chatCooldownTimer);
                refreshChatButtonState();
                chatCooldownTimer = window.setInterval(function() {
                    refreshChatButtonState();
                    if (getChatCooldownRemaining() <= 0) {
                        window.clearInterval(chatCooldownTimer);
                        chatCooldownTimer = null;
                    }
                }, 250);
            }

            function getClientIp() {
                if (clientIpPromise) return clientIpPromise;
                clientIpPromise = new Promise(function(resolve) {
                    var timeout = window.setTimeout(function() {
                        resolve('unknown');
                    }, 1400);

                    fetch('https://api.ipify.org?format=json', { cache: 'no-store' })
                        .then(function(response) {
                            if (!response.ok) throw new Error('ip unavailable');
                            return response.json();
                        })
                        .then(function(data) {
                            window.clearTimeout(timeout);
                            resolve(data && data.ip ? String(data.ip) : 'unknown');
                        })
                        .catch(function() {
                            window.clearTimeout(timeout);
                            resolve('unknown');
                        });
                });
                return clientIpPromise;
            }

            function prefetchClientIp() {
                getClientIp().catch(function() {});
            }

            function withTimeout(promise, ms, fallback) {
                return new Promise(function(resolve) {
                    var settled = false;
                    var timer = window.setTimeout(function() {
                        if (settled) return;
                        settled = true;
                        resolve(fallback);
                    }, ms);
                    promise.then(function(value) {
                        if (settled) return;
                        settled = true;
                        window.clearTimeout(timer);
                        resolve(value);
                    }).catch(function() {
                        if (settled) return;
                        settled = true;
                        window.clearTimeout(timer);
                        resolve(fallback);
                    });
                });
            }

            function getBlockedWord(message) {
                var cleanMessage = String(message || '').toLowerCase();
                return (streamChatSettings.blocked_words || []).find(function(word) {
                    return word && cleanMessage.includes(word);
                }) || '';
            }

            function setChatFormDisabled(disabled, message) {
                if (chatForm) chatForm.classList.toggle('is-disabled', Boolean(disabled));
                if (chatNameInput) chatNameInput.disabled = Boolean(disabled);
                if (chatMessageInput) chatMessageInput.disabled = Boolean(disabled);
                if (chatSendButton) chatSendButton.disabled = Boolean(disabled);
                if (disabled) updateChatEmpty(message || 'chat is paused.');
            }

            async function loadStreamChatSettings() {
                var client = getStreamClient();
                if (!client) return streamChatSettings;
                try {
                    var result = await client
                        .from('stream_chat_settings')
                        .select('*')
                        .eq('id', true)
                        .maybeSingle();
                    if (!result.error && result.data) {
                        streamChatSettings = normalizeStreamChatSettings(result.data);
                    }
                } catch (error) {
                    streamChatSettings = normalizeStreamChatSettings(streamChatSettings);
                }
                CHAT_COOLDOWN_MS = streamChatSettings.slow_mode_seconds * 1000;
                return streamChatSettings;
            }

            async function syncPublicChatRules() {
                if (streamSettings.stream_chat_enabled === false) {
                    setChatFormDisabled(true, 'chat is closed.');
                    refreshChatButtonState();
                    return;
                }

                await loadStreamChatSettings();
                setChatFormDisabled(streamChatSettings.chat_enabled === false, 'chat is paused.');
                refreshChatButtonState();
            }

            function updateChatEmpty(message) {
                if (!chatEmpty) return;
                var hasMessages = chatFeed && chatFeed.querySelector('.stream-chat-message');
                chatEmpty.textContent = message || 'say hi first.';
                chatEmpty.hidden = Boolean(hasMessages);
            }

            function setChatPaused(paused) {
                document.body.classList.toggle('stream-chat-paused-state', Boolean(paused));
                if (chatPausedButton) chatPausedButton.hidden = !paused;
            }

            function isChatNearBottom() {
                if (!chatFeed) return true;
                return chatFeed.scrollHeight - chatFeed.scrollTop - chatFeed.clientHeight < 90;
            }

            function scrollChatToBottom() {
                if (!chatFeed) return;
                chatFeed.scrollTop = chatFeed.scrollHeight;
                setChatPaused(false);
            }

            function trimVisibleChatMessages() {
                if (!chatFeed) return;
                var messages = Array.from(chatFeed.querySelectorAll('.stream-chat-message'));
                while (messages.length > CHAT_LIMIT) {
                    var oldest = messages.shift();
                    if (oldest) {
                        seenMessageIds.delete(oldest.dataset.messageId || '');
                        oldest.remove();
                    }
                }
                updateChatEmpty();
            }

            function isSideBySideLayout() {
                return window.matchMedia('(min-width: 860px), (orientation: landscape)').matches;
            }

            function updateResizeOrientation() {
                if (!layoutResizer) return;
                layoutResizer.setAttribute('aria-orientation', isSideBySideLayout() ? 'vertical' : 'horizontal');
            }

            function clamp(value, min, max) {
                return Math.min(Math.max(value, min), max);
            }

            function setVerticalVideoSize(clientY) {
                if (!liveShell) return;
                var shellRect = liveShell.getBoundingClientRect();
                var header = liveShell.querySelector('.stream-room-header');
                var headerHeight = header ? header.getBoundingClientRect().height : 0;
                var available = Math.max(260, shellRect.height - headerHeight - 18);
                var target = clientY - shellRect.top - headerHeight - 9;
                liveShell.style.setProperty('--stream-video-block', clamp(target, 230, available * 0.68) + 'px');
            }

            function setHorizontalChatSize(clientX) {
                if (!liveShell) return;
                var shellRect = liveShell.getBoundingClientRect();
                var target = shellRect.right - clientX - 6;
                var maxWidth = Math.min(520, shellRect.width * 0.62);
                liveShell.style.setProperty('--stream-chat-inline', clamp(target, 220, maxWidth) + 'px');
            }

            function initLayoutResize() {
                if (!layoutResizer || !liveShell) return;
                updateResizeOrientation();

                var activePointer = null;
                function finishResize() {
                    activePointer = null;
                    document.body.classList.remove('stream-resizing');
                }

                layoutResizer.addEventListener('pointerdown', function(event) {
                    activePointer = event.pointerId;
                    document.body.classList.add('stream-resizing');
                    layoutResizer.setPointerCapture?.(event.pointerId);
                    event.preventDefault();
                });

                function moveResize(event) {
                    if (activePointer !== event.pointerId) return;
                    if (isSideBySideLayout()) {
                        setHorizontalChatSize(event.clientX);
                    } else {
                        setVerticalVideoSize(event.clientY);
                    }
                    event.preventDefault();
                }

                layoutResizer.addEventListener('pointermove', moveResize);
                document.addEventListener('pointermove', moveResize, { passive: false });
                document.addEventListener('pointerup', finishResize);
                document.addEventListener('pointercancel', finishResize);
                layoutResizer.addEventListener('keydown', function(event) {
                    var sideBySide = isSideBySideLayout();
                    var step = event.shiftKey ? 28 : 14;
                    var handled = false;

                    if (sideBySide && (event.key === 'ArrowLeft' || event.key === 'ArrowRight')) {
                        var currentWidth = parseFloat(getComputedStyle(liveShell).getPropertyValue('--stream-chat-inline')) || 340;
                        liveShell.style.setProperty('--stream-chat-inline', clamp(currentWidth + (event.key === 'ArrowLeft' ? step : -step), 220, 520) + 'px');
                        handled = true;
                    }

                    if (!sideBySide && (event.key === 'ArrowUp' || event.key === 'ArrowDown')) {
                        var currentHeight = parseFloat(getComputedStyle(liveShell).getPropertyValue('--stream-video-block')) || 210;
                        liveShell.style.setProperty('--stream-video-block', clamp(currentHeight + (event.key === 'ArrowDown' ? step : -step), 230, window.innerHeight * 0.68) + 'px');
                        handled = true;
                    }

                    if (handled) {
                        event.preventDefault();
                    }
                });

                window.addEventListener('resize', updateResizeOrientation, { passive: true });
            }

            function appendChatMessage(message, forceScroll) {
                if (!chatFeed || !message || !message.id || seenMessageIds.has(message.id)) return;
                var shouldScroll = forceScroll || isChatNearBottom();
                seenMessageIds.add(message.id);

                var row = document.createElement('article');
                row.className = 'stream-chat-message';
                row.dataset.messageId = message.id;

                var meta = document.createElement('div');
                meta.className = 'stream-chat-message-meta';

                var name = document.createElement('strong');
                name.textContent = normalizeText(message.nickname || 'guest', 18) || 'guest';

                var time = document.createElement('time');
                var date = new Date(message.created_at || Date.now());
                time.dateTime = Number.isNaN(date.getTime()) ? '' : date.toISOString();
                time.textContent = Number.isNaN(date.getTime())
                    ? 'now'
                    : date.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });

                var text = document.createElement('p');
                text.textContent = normalizeText(message.message || '', CHAT_MESSAGE_LIMIT);

                meta.appendChild(name);
                meta.appendChild(time);
                row.appendChild(meta);
                row.appendChild(text);
                chatFeed.appendChild(row);
                trimVisibleChatMessages();
                updateChatEmpty();

                if (shouldScroll) {
                    scrollChatToBottom();
                } else {
                    setChatPaused(true);
                }
            }

            function renderChatMessages(messages) {
                if (!chatFeed) return;
                Array.from(chatFeed.querySelectorAll('.stream-chat-message')).forEach(function(node) {
                    node.remove();
                });
                seenMessageIds.clear();
                (messages || []).slice(-CHAT_LIMIT).forEach(function(message) {
                    appendChatMessage(message, true);
                });
                updateChatEmpty();
                scrollChatToBottom();
            }

            async function loadStreamMessages() {
                if (isChatTestMode()) {
                    renderChatMessages(localTestMessages);
                    if (chatState) chatState.textContent = 'test';
                    refreshChatButtonState();
                    return true;
                }

                var client = getStreamClient();
                if (!client) {
                    if (chatState) chatState.textContent = 'offline';
                    updateChatEmpty('chat needs the site connection.');
                    return false;
                }

                var result = await client
                    .from(STREAM_CHAT_TABLE)
                    .select('id,nickname,message,created_at,is_hidden')
                    .or('is_hidden.eq.false,is_hidden.is.null')
                    .order('created_at', { ascending: false })
                    .limit(CHAT_LIMIT);

                if (result.error) {
                    console.warn('Stream chat unavailable:', result.error.message);
                    if (chatState) chatState.textContent = 'offline';
                    updateChatEmpty('chat needs setup.');
                    return false;
                }

                renderChatMessages((result.data || []).slice().reverse());
                if (chatState) chatState.textContent = 'live';
                refreshChatButtonState();
                return true;
            }

            function startChatRealtime() {
                if (isChatTestMode()) return;
                var client = getStreamClient();
                if (!client || chatChannel) return;

                chatChannel = client
                    .channel('doll_stream_chat_feed')
                    .on('postgres_changes', {
                        event: 'INSERT',
                        schema: 'public',
                        table: STREAM_CHAT_TABLE
                    }, function(payload) {
                        if (payload.new && payload.new.is_hidden) return;
                        appendChatMessage(payload.new, true);
                    })
                    .subscribe(function(status) {
                        if (status === 'SUBSCRIBED' && chatState) {
                            chatState.textContent = 'live';
                        }
                    });
            }

            function startChatPoll() {
                if (isChatTestMode()) return;
                window.clearInterval(chatPollTimer);
                chatPollTimer = window.setInterval(function() {
                    syncPublicChatRules().catch(function() {});
                    loadStreamMessages();
                }, 6000);
            }

            async function startStreamChat() {
                applyStoredNickname();
                if (streamSettings.stream_chat_enabled === false) {
                    if (chatState) chatState.textContent = 'closed';
                    setChatFormDisabled(true, 'chat is closed.');
                    return;
                }
                if (chatState) chatState.textContent = 'loading';
                await syncPublicChatRules();
                var ready = await loadStreamMessages();
                startChatCooldownTicker();
                if (!ready) return;
                prefetchClientIp();
                startChatRealtime();
                startChatPoll();
            }

            function stopStreamChat() {
                var client = getStreamClient();
                window.clearInterval(chatPollTimer);
                window.clearInterval(chatCooldownTimer);
                chatPollTimer = null;
                chatCooldownTimer = null;
                if (chatChannel && client) {
                    client.removeChannel(chatChannel);
                }
                chatChannel = null;
                if (chatState) chatState.textContent = 'offline';
                setChatFormDisabled(false);
                renderChatMessages([]);
                updateChatEmpty('chat is sleeping.');
            }

            async function sendStreamChat(event) {
                event.preventDefault();
                var nickname = normalizeText(chatNameInput ? chatNameInput.value : getStoredNickname(), 18);
                var message = normalizeText(chatMessageInput ? chatMessageInput.value : '', CHAT_MESSAGE_LIMIT);
                if (!nickname) {
                    showToast('Pick a name first.');
                    if (chatNameInput) chatNameInput.focus();
                    return;
                }
                if (!message) {
                    showToast('Type a message first.');
                    return;
                }
                if (streamSettings.stream_chat_enabled === false) {
                    showToast('Chat is closed.');
                    return;
                }
                if (streamChatSettings.chat_enabled === false) {
                    showToast('Chat is paused.');
                    return;
                }
                if (getBlockedWord(message)) {
                    showToast('Message blocked.');
                    return;
                }

                if (isChatTestMode()) {
                    lockNickname(nickname);
                    localTestMessages.push({
                        id: 'test-' + Date.now() + '-' + Math.random().toString(16).slice(2),
                        nickname: nickname,
                        message: message,
                        created_at: new Date().toISOString()
                    });
                    localTestMessages = localTestMessages.slice(-CHAT_LIMIT);
                    if (chatMessageInput) chatMessageInput.value = '';
                    renderChatMessages(localTestMessages);
                    refreshChatButtonState();
                    return;
                }

                var client = getStreamClient();
                if (!client) {
                    showToast('Chat connection is not ready.');
                    return;
                }

                var remaining = getChatCooldownRemaining();
                if (remaining > 0) {
                    startChatCooldownTicker();
                    showToast(String(Math.ceil(remaining / 1000)));
                    return;
                }

                if (chatSendButton) {
                    chatSendButton.disabled = true;
                    chatSendButton.textContent = '...';
                }

                try {
                    var ipAddress = await withTimeout(getClientIp(), 900, 'unknown');
                    var result = await client.from(STREAM_CHAT_TABLE).insert({
                        nickname: nickname,
                        message: message,
                        ip_address: ipAddress
                    });

                    if (result.error) throw result.error;
                    lockNickname(nickname);
                    if (chatMessageInput) chatMessageInput.value = '';
                    setLastChatSentAt(Date.now());
                    await loadStreamMessages();
                    startChatCooldownTicker();
                } catch (error) {
                    console.warn('Stream chat send failed:', error);
                    var messageText = String(error && error.message ? error.message : '');
                    var lowerMessage = messageText.toLowerCase();
                    if (lowerMessage.includes('nickname is banned')) {
                        unlockNicknameForChange();
                        showToast('Name banned. Pick another.');
                    } else if (lowerMessage.includes('banned') || lowerMessage.includes('unavailable for this user')) {
                        showToast('Banned.');
                    } else if (lowerMessage.includes('paused')) {
                        showToast('Chat is paused.');
                    } else if (lowerMessage.includes('nickname is already')) {
                        unlockNicknameForChange();
                        showToast('Name taken. Pick another.');
                    } else if (lowerMessage.includes('nickname is locked')) {
                        showToast('Use your first nickname.');
                    } else if (lowerMessage.includes('wait') || lowerMessage.includes('seconds')) {
                        showToast(String(Math.ceil(CHAT_COOLDOWN_MS / 1000)));
                    } else if (lowerMessage.includes('blocked word')) {
                        showToast('Message blocked.');
                    } else {
                        showToast('Chat could not send.');
                    }
                } finally {
                    refreshChatButtonState();
                }
            }

            function getPresenceKey() {
                try {
                    var existing = sessionStorage.getItem('doll_stream_presence_key');
                    if (existing) return existing;
                    var generated = (window.crypto && window.crypto.randomUUID)
                        ? window.crypto.randomUUID()
                        : String(Date.now()) + '-' + Math.random().toString(16).slice(2);
                    sessionStorage.setItem('doll_stream_presence_key', generated);
                    return generated;
                } catch (error) {
                    return String(Date.now()) + '-' + Math.random().toString(16).slice(2);
                }
            }

            function startViewerPresence() {
                var client = getStreamClient();
                if (!client) {
                    setViewerCount(1, true);
                    return;
                }

                stopViewerPresence();
                presenceChannel = client.channel('doll_stream_viewers', {
                    config: {
                        presence: {
                            key: getPresenceKey()
                        }
                    }
                });

                presenceChannel.on('presence', { event: 'sync' }, function() {
                    var state = presenceChannel.presenceState();
                    var count = Object.keys(state).reduce(function(total, key) {
                        return total + state[key].length;
                    }, 0);
                    setViewerCount(count, true);
                });

                presenceChannel.subscribe(function(status) {
                    if (status === 'SUBSCRIBED') {
                        presenceChannel.track({
                            online_at: new Date().toISOString()
                        });
                    }
                });
            }

            function stopViewerPresence() {
                var client = getStreamClient();
                if (presenceChannel && client) {
                    presenceChannel.untrack();
                    client.removeChannel(presenceChannel);
                }
                presenceChannel = null;
            }

            function getVideoFrame() {
                return document.getElementById('stream-video-frame');
            }

            function getUrl(value) {
                try {
                    return new URL(value);
                } catch (error) {
                    return null;
                }
            }

            function getTwitchParent() {
                return window.location.hostname || 'localhost';
            }

            function getDirectVideoType(url) {
                var path = (url.pathname || '').toLowerCase();
                if (/\.mp4$|\.m4v$|\.mov$/.test(path)) return 'video/mp4';
                if (/\.webm$/.test(path)) return 'video/webm';
                if (/\.ogv$|\.ogg$/.test(path)) return 'video/ogg';
                if (/\.m3u8$/.test(path)) return 'application/vnd.apple.mpegurl';
                return '';
            }

            function detectProvider(url, preferredProvider, role) {
                if (preferredProvider && preferredProvider !== 'auto') return preferredProvider;
                var host = url.hostname.replace(/^www\./, '').toLowerCase();
                if (host.includes('youtube.com') || host === 'youtu.be') return 'youtube';
                if (host.includes('twitch.tv')) return 'twitch';
                if (host.includes('vimeo.com')) return 'vimeo';
                if (getDirectVideoType(url)) return 'direct';
                if ((url.pathname || '').includes('/embed/video')) return 'owncast';
                return role === 'live' ? 'owncast' : 'direct';
            }

            function getYouTubeId(url) {
                var host = url.hostname.replace(/^www\./, '').toLowerCase();
                var parts = url.pathname.split('/').filter(Boolean);
                if (host === 'youtu.be') return parts[0] || '';
                if (url.searchParams.get('v')) return url.searchParams.get('v');
                if (['embed', 'shorts', 'live'].includes(parts[0])) return parts[1] || '';
                return '';
            }

            function getVimeoId(url) {
                var parts = url.pathname.split('/').filter(Boolean);
                var videoIndex = parts.indexOf('video');
                if (videoIndex >= 0 && parts[videoIndex + 1]) return parts[videoIndex + 1];
                return parts.find(function(part) {
                    return /^\d+$/.test(part);
                }) || '';
            }

            function getTwitchEmbedUrl(url) {
                var parts = url.pathname.split('/').filter(Boolean);
                var params = new URLSearchParams({
                    parent: getTwitchParent(),
                    autoplay: 'true',
                    muted: 'true'
                });
                if (parts[0] === 'videos' && parts[1]) {
                    params.set('video', parts[1].startsWith('v') ? parts[1] : 'v' + parts[1]);
                } else if (url.searchParams.get('video')) {
                    var videoId = url.searchParams.get('video');
                    params.set('video', videoId.startsWith('v') ? videoId : 'v' + videoId);
                } else if (parts[0]) {
                    params.set('channel', parts[0]);
                }
                return 'https://player.twitch.tv/?' + params.toString();
            }

            function getPlayerSource(rawUrl, preferredProvider, role) {
                var url = getUrl(rawUrl);
                if (!url) return { kind: 'offline', provider: 'none', status: 'offline' };
                var provider = detectProvider(url, preferredProvider, role);
                var title = role === 'live' ? 'Live video' : 'Preview video';

                if (provider === 'youtube') {
                    var youtubeId = getYouTubeId(url);
                    if (!youtubeId) return { kind: 'iframe', provider, src: url.href, status: 'preview', title };
                    return {
                        kind: 'iframe',
                        provider,
                        src: 'https://www.youtube.com/embed/' + encodeURIComponent(youtubeId) + '?autoplay=1&mute=1&playsinline=1&rel=0',
                        status: role === 'live' ? 'online' : 'preview',
                        title
                    };
                }

                if (provider === 'twitch') {
                    return {
                        kind: 'iframe',
                        provider,
                        src: getTwitchEmbedUrl(url),
                        status: role === 'live' ? 'online' : 'preview',
                        title
                    };
                }

                if (provider === 'vimeo') {
                    var vimeoId = getVimeoId(url);
                    return {
                        kind: 'iframe',
                        provider,
                        src: vimeoId
                            ? 'https://player.vimeo.com/video/' + encodeURIComponent(vimeoId) + '?autoplay=1&muted=1&playsinline=1'
                            : url.href,
                        status: role === 'live' ? 'online' : 'preview',
                        title
                    };
                }

                if (provider === 'direct') {
                    return {
                        kind: getDirectVideoType(url) ? 'video' : 'iframe',
                        provider,
                        src: url.href,
                        type: getDirectVideoType(url),
                        status: role === 'live' ? 'online' : 'preview',
                        title
                    };
                }

                var owncastEmbedUrl = new URL(url.href);
                if (!owncastEmbedUrl.pathname.includes('/embed/video')) {
                    owncastEmbedUrl.pathname = owncastEmbedUrl.pathname.replace(/\/+$/, '') + '/embed/video';
                    owncastEmbedUrl.search = '';
                }
                owncastEmbedUrl.searchParams.set('initiallyMuted', 'true');
                return {
                    kind: 'iframe',
                    provider: 'owncast',
                    src: owncastEmbedUrl.href,
                    status: role === 'live' ? 'checking' : 'preview',
                    title
                };
            }

            function getCurrentPlayerSource() {
                var baseUrl = getStreamUrl();
                var videoSrc = getVideoSourceUrl();
                var provider = liveShell?.dataset.streamProvider || 'auto';
                if (baseUrl) return getPlayerSource(baseUrl, provider, 'live');
                if (videoSrc) return getPlayerSource(videoSrc, provider, 'preview');
                return { kind: 'offline', provider: 'none', status: 'offline' };
            }

            function clearStreamFrames() {
                var videoFrame = getVideoFrame();
                if (videoFrame) {
                    videoFrame.classList.remove('is-offline');
                    videoFrame.textContent = '';
                    delete videoFrame.dataset.playerSrc;
                    delete videoFrame.dataset.playerProvider;
                }
            }

            function mountOfflinePlayer() {
                var videoFrame = getVideoFrame();
                if (!videoFrame) return;
                if (videoFrame.querySelector('.stream-offline-player')) return;
                var offlineMessage = normalizeText(liveShell?.dataset.offlineMessage || DEFAULT_STREAM_SETTINGS.stream_offline_message, 160);
                videoFrame.classList.add('is-offline');
                videoFrame.innerHTML = [
                    '<div class="stream-offline-player">',
                    '  <span class="stream-offline-orb" aria-hidden="true"></span>',
                    '  <h2>Offline</h2>',
                    '  <p></p>',
                    '</div>'
                ].join('');
                var message = videoFrame.querySelector('.stream-offline-player p');
                if (message) message.textContent = offlineMessage || DEFAULT_STREAM_SETTINGS.stream_offline_message;
            }

            function syncAutoVideoAspect(video) {
                if (!video || streamSettings.stream_aspect !== 'auto') return;
                var width = video.videoWidth || 0;
                var height = video.videoHeight || 0;
                if (!width || !height) return;
                document.body.classList.toggle('stream-aspect-portrait', height > width);
                document.body.classList.toggle('stream-aspect-landscape', width >= height);
                document.body.classList.toggle('stream-aspect-square', width === height);
            }

            function mountPlayerSource(source) {
                var videoFrame = getVideoFrame();
                if (!videoFrame || !source || source.kind === 'offline' || !source.src) return false;
                if (videoFrame.dataset.playerSrc === source.src && videoFrame.dataset.playerKind === source.kind) return true;

                var player;
                if (source.kind === 'video') {
                    player = document.createElement('video');
                    player.className = 'stream-local-video';
                    player.controls = true;
                    player.loop = source.provider !== 'owncast';
                    player.muted = true;
                    player.autoplay = true;
                    player.playsInline = true;
                    player.preload = 'metadata';
                    if (source.type) player.type = source.type;
                    player.src = source.src;
                    player.addEventListener('loadedmetadata', function() {
                        syncAutoVideoAspect(player);
                    });
                    player.addEventListener('error', function() {
                        videoFrame.textContent = '';
                        mountOfflinePlayer();
                        setUpdatedLine('preview unavailable');
                    }, { once: true });
                } else {
                    player = document.createElement('iframe');
                    player.title = source.title || 'Stream video';
                    player.src = source.src;
                    player.loading = 'lazy';
                    player.allow = 'autoplay; fullscreen; picture-in-picture; encrypted-media';
                    player.allowFullscreen = true;
                    player.referrerPolicy = 'origin';
                }

                videoFrame.classList.remove('is-offline');
                videoFrame.dataset.playerSrc = source.src;
                videoFrame.dataset.playerKind = source.kind;
                videoFrame.dataset.playerProvider = source.provider || '';
                videoFrame.textContent = '';
                videoFrame.appendChild(player);
                player.play?.().catch(function() {
                    // Controls are visible if autoplay is blocked.
                });
                return true;
            }

            function mountStreamEmbeds() {
                if (!liveShell) return;
                var source = getCurrentPlayerSource();
                if (source.kind === 'offline') {
                    setConnectionState('offline', 'offline');
                    setViewerCount(currentViewerCount || 1, true);
                    if (chatState) chatState.textContent = 'loading';
                    if (serverLine) serverLine.textContent = 'offline';
                    setUpdatedLine('offline');
                    mountOfflinePlayer();
                    return;
                }

                if (serverLine) serverLine.textContent = source.provider || 'video';
                if (chatState) chatState.textContent = 'loading';
                setConnectionState(source.status === 'checking' ? 'setup' : source.status, source.status === 'checking' ? 'checking' : source.status);
                setUpdatedLine(source.provider || 'video');
                mountPlayerSource(source);
            }

            async function refreshStreamStatus(isManual) {
                var baseUrl = getStreamUrl();
                var source = getCurrentPlayerSource();
                if (!baseUrl) {
                    setConnectionState(source.kind === 'offline' ? 'offline' : source.status, source.kind === 'offline' ? 'offline' : source.status);
                    setViewerCount(currentViewerCount || 1, true);
                    setUpdatedLine(source.kind === 'offline' ? 'offline' : (source.provider || 'preview'));
                    if (source.kind !== 'offline') {
                        mountPlayerSource(source);
                    } else {
                        mountOfflinePlayer();
                    }
                    return;
                }

                if (source.provider !== 'owncast') {
                    setConnectionState('online', 'online');
                    setUpdatedLine(source.provider || 'online');
                    mountPlayerSource(source);
                    return;
                }

                setUpdatedLine('checking...');

                try {
                    var response = await fetch(baseUrl + '/api/status', {
                        headers: { Accept: 'application/json' },
                        cache: 'no-store'
                    });
                    if (!response.ok) throw new Error('status unavailable');

                    var status = await response.json();
                    var online = Boolean(status.online);
                    var title = status.streamTitle || liveShell.dataset.streamName || 'Live';

                    setViewerCount(Number(status.viewerCount || 0), false);
                    setConnectionState(online ? 'online' : 'offline', online ? 'online' : 'offline');
                    setUpdatedLine('updated now');
                    if (isManual) showToast('Stream status refreshed.');
                } catch (error) {
                    setConnectionState('offline', 'status unavailable');
                    setUpdatedLine('stream unavailable');
                    if (isManual) showToast('Stream is unavailable right now.');
                }
            }

            function startStatusLoop() {
                window.clearInterval(statusTimer);
                refreshStreamStatus(false);
                statusTimer = window.setInterval(function() {
                    refreshStreamStatus(false);
                }, 30000);
            }

            function stopStatusLoop() {
                window.clearInterval(statusTimer);
                statusTimer = null;
            }

            function showLivePreview() {
                if (!comingSoon || !liveShell) return;
                applyStreamSettings();
                document.body.classList.add('stream-live-unlocked');
                comingSoon.hidden = true;
                liveShell.hidden = false;
                mountStreamEmbeds();
                startStatusLoop();
                startViewerPresence();
                startStreamChat();
            }

            function showComingSoon() {
                if (!comingSoon || !liveShell) return;
                document.body.classList.remove('stream-live-unlocked');
                document.body.classList.remove('stream-theater-mode');
                document.body.classList.remove('stream-fullscreen-mode');
                if (theaterButton) theaterButton.textContent = 'Theater';
                liveShell.hidden = true;
                comingSoon.hidden = false;
                unlockTaps = 0;
                stopStatusLoop();
                stopViewerPresence();
                stopStreamChat();
                clearStreamFrames();
            }

            function hideLivePreview() {
                showComingSoon();
            }

            function syncChatOverlayButtons() {
                var hidden = document.body.classList.contains('stream-chat-overlay-hidden');
                [chatOverlayButton, playerChatButton].forEach(function(button) {
                    if (!button) return;
                    button.textContent = hidden ? 'show chat' : 'hide chat';
                    button.setAttribute('aria-pressed', hidden ? 'true' : 'false');
                });
            }

            function toggleChatOverlay() {
                if (streamSettings.stream_chat_enabled === false) {
                    showToast('Chat is off.');
                    return;
                }
                document.body.classList.toggle('stream-chat-overlay-hidden');
                syncChatOverlayButtons();
            }

            async function requestNativePictureInPicture() {
                var video = getVideoFrame()?.querySelector('video');
                if (!video || typeof video.requestPictureInPicture !== 'function') {
                    showToast('PiP is inside that player.');
                    return;
                }

                try {
                    if (document.pictureInPictureElement) {
                        await document.exitPictureInPicture();
                    } else {
                        await video.requestPictureInPicture();
                    }
                } catch (error) {
                    showToast('PiP is unavailable here.');
                }
            }

            async function initStreamPage() {
                applyStreamSettings();
                await loadStreamSettings();
                syncChatOverlayButtons();
                if (streamSettings.stream_enabled === true || streamPreviewMode) {
                    showLivePreview();
                } else {
                    showComingSoon();
                }
            }

            comingSoon?.addEventListener('click', function() {
                if (!streamPreviewMode) return;
                unlockTaps += 1;
                window.clearTimeout(unlockResetTimer);
                unlockResetTimer = window.setTimeout(function() {
                    unlockTaps = 0;
                }, 1800);

                if (unlockTaps >= 5) {
                    window.clearTimeout(unlockResetTimer);
                    unlockTaps = 0;
                    showLivePreview();
                }
            });

            hidePreviewButton?.addEventListener('click', hideLivePreview);
            chatOverlayButton?.addEventListener('click', toggleChatOverlay);
            playerChatButton?.addEventListener('click', toggleChatOverlay);
            pipButton?.addEventListener('click', requestNativePictureInPicture);
            initLayoutResize();
            chatPausedButton?.addEventListener('click', scrollChatToBottom);
            chatFeed?.addEventListener('scroll', function() {
                setChatPaused(!isChatNearBottom());
            }, { passive: true });
            chatNameInput?.addEventListener('focus', prefetchClientIp, { passive: true });
            chatMessageInput?.addEventListener('focus', prefetchClientIp, { passive: true });
            chatForm?.addEventListener('submit', sendStreamChat);
            theaterButton?.addEventListener('click', function() {
                document.body.classList.toggle('stream-theater-mode');
                document.body.classList.toggle('stream-fullscreen-mode', document.body.classList.contains('stream-theater-mode'));
                theaterButton.textContent = document.body.classList.contains('stream-theater-mode') ? 'Normal' : 'Theater';
            });
            fullscreenButton?.addEventListener('click', async function() {
                var fullTarget = liveShell || getVideoFrame();
                if (!fullTarget) return;

                try {
                    if (fullTarget.requestFullscreen) {
                        await fullTarget.requestFullscreen();
                    } else if (fullTarget.webkitRequestFullscreen) {
                        fullTarget.webkitRequestFullscreen();
                    } else {
                        document.body.classList.add('stream-theater-mode');
                        document.body.classList.add('stream-fullscreen-mode');
                        if (theaterButton) theaterButton.textContent = 'Normal';
                        showToast('Fullscreen unavailable here, theater mode on.');
                    }
                } catch (error) {
                    document.body.classList.add('stream-theater-mode');
                    document.body.classList.add('stream-fullscreen-mode');
                    if (theaterButton) theaterButton.textContent = 'Normal';
                    showToast('Fullscreen unavailable here, theater mode on.');
                }
            });

            document.addEventListener('fullscreenchange', function() {
                var isFullscreen = document.fullscreenElement === liveShell;
                document.body.classList.toggle('stream-fullscreen-mode', isFullscreen || document.body.classList.contains('stream-theater-mode'));
            });
            document.addEventListener('webkitfullscreenchange', function() {
                var isFullscreen = document.webkitFullscreenElement === liveShell;
                document.body.classList.toggle('stream-fullscreen-mode', isFullscreen || document.body.classList.contains('stream-theater-mode'));
            });
            initStreamPage();
        }());
    </script>
</body>
</html>
