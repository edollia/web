<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <title>Not found - Lia</title>
    <style>
        * { box-sizing: border-box; }
        body {
            min-height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            padding: 24px;
            background:
                radial-gradient(circle at 18% 18%, rgba(255, 255, 255, 0.72), transparent 24%),
                radial-gradient(circle at 82% 70%, rgba(255, 204, 228, 0.46), transparent 26%),
                linear-gradient(rgba(255, 247, 251, 0.94), rgba(255, 226, 239, 0.78));
            color: rgba(82, 75, 80, 0.84);
            font-family: Arial, sans-serif;
        }
        main {
            width: min(88vw, 360px);
            padding: 28px 24px;
            border: 1px solid rgba(255, 180, 212, 0.58);
            border-radius: 24px;
            background:
                linear-gradient(rgba(255, 255, 255, 0.84), rgba(255, 246, 251, 0.76)),
                repeating-linear-gradient(90deg, rgba(255, 231, 242, 0.26) 0 10px, rgba(255, 250, 253, 0.26) 10px 20px);
            text-align: center;
            box-shadow: 0 18px 40px rgba(255, 145, 195, 0.18);
        }
        h1 {
            margin: 0 0 8px;
            color: rgba(122, 76, 92, 0.88);
            font-family: "Comic Sans MS", "Trebuchet MS", cursive;
            font-size: 30px;
            letter-spacing: 0;
        }
        p {
            margin: 0 0 18px;
            color: rgba(122, 76, 92, 0.66);
            line-height: 1.45;
        }
        a {
            min-height: 38px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0 16px;
            border: 1px solid rgba(255, 180, 212, 0.58);
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.78);
            color: rgba(174, 85, 130, 0.86);
            font-weight: 700;
            text-decoration: none;
        }
    </style>
    <script>
        (function() {
            var redirects = {
                '/admin.html': '/admin/',
                '/stream': '/rooms/',
                '/stream/': '/rooms/',
                '/stream.html': '/rooms/',
                '/index.html': '/'
            };
            var cleanPath = redirects[window.location.pathname.toLowerCase()];
            if (cleanPath) {
                window.location.replace(cleanPath + window.location.search + window.location.hash);
            }
        }());
    </script>
</head>
<body>
    <main>
        <h1>404</h1>
        <p>That little page is not here.</p>
        <a href="/">back home</a>
    </main>
</body>
</html>
