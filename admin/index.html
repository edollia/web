<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Dollia Admin</title>
    <link rel="stylesheet" href="../admin.css?v=1.4">
</head>
<body>
    <main class="admin-shell">
        <section class="admin-auth-panel" id="gate-panel">
            <div class="admin-auth-card">
                <p class="admin-kicker">locked</p>
                <h1>secret door</h1>
                <form id="admin-passcode-form" class="admin-form">
                    <input id="admin-passcode" type="password" inputmode="numeric" autocomplete="off" maxlength="8" placeholder="passcode">
                    <button type="submit">enter</button>
                </form>
                <p class="admin-status" id="gate-status"></p>
            </div>
        </section>

        <section class="admin-auth-panel hidden" id="login-panel">
            <div class="admin-auth-card">
                <p class="admin-kicker">admin</p>
                <h1>login</h1>
                <form id="admin-login-form" class="admin-form">
                    <input id="admin-email" type="email" autocomplete="email" placeholder="email">
                    <input id="admin-password" type="password" autocomplete="current-password" placeholder="password">
                    <button type="submit">open</button>
                </form>
                <p class="admin-status" id="login-status"></p>
            </div>
        </section>

        <section class="admin-dashboard hidden" id="dashboard-panel">
            <header class="admin-header">
                <div>
                    <p class="admin-kicker">dashboard</p>
                    <h1>submissions</h1>
                </div>
                <div class="admin-header-actions">
                    <button id="refresh-admin">refresh</button>
                    <button id="logout-admin">logout</button>
                </div>
            </header>

            <section class="admin-stats" id="admin-stats"></section>

            <nav class="admin-tabs" id="admin-tabs">
                <button class="active" data-panel="pending-drawings-panel">pending doods</button>
                <button data-panel="pending-questions-panel">pending asks</button>
                <button data-panel="published-drawings-panel">posted doods</button>
                <button data-panel="published-questions-panel">answered asks</button>
            </nav>

            <p class="admin-status" id="admin-status"></p>

            <section class="admin-panel active" id="pending-drawings-panel">
                <div class="admin-bulk-bar">
                    <button class="soft" data-bulk-action="select" data-list="pending-drawings-list">select all</button>
                    <button data-bulk-action="approve" data-list="pending-drawings-list">approve selected</button>
                    <button class="danger" data-bulk-action="delete" data-list="pending-drawings-list">delete selected</button>
                </div>
                <div class="admin-list admin-doods-list" id="pending-drawings-list"></div>
            </section>

            <section class="admin-panel" id="pending-questions-panel">
                <div class="admin-list" id="pending-questions-list"></div>
            </section>

            <section class="admin-panel" id="published-drawings-panel">
                <div class="admin-bulk-bar">
                    <button class="soft" data-bulk-action="select" data-list="published-drawings-list">select all</button>
                    <button class="danger" data-bulk-action="delete" data-list="published-drawings-list">delete selected</button>
                </div>
                <div class="admin-list admin-doods-list" id="published-drawings-list"></div>
            </section>

            <section class="admin-panel" id="published-questions-panel">
                <div class="admin-list" id="published-questions-list"></div>
            </section>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../admin.js?v=1.4"></script>
</body>
</html>
